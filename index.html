// Datos para la tabla
const datosTabla = entidades.flatMap(ent => ent.prediosInfo.map(p => ({
  Cod_Municipio: ent.cod_municipio,
  MUNICIPIO: ent.municipio,
  DEPARTAMENTO: ent.departamento,
  HECHO_VICTIMIZANTE: p.HV1,
  NOMBRE_DEL_PREDIO: p.predio,
  Hectareas: p.HA || "-",
  FOLIO_DE_MATRICULA: p.FMI,
  ORGANIZACIÓN_BENEFICIARIA: p.organizacion
})));

// Variables globales
let municipiosLayer = null;
let municipioLayers = new Map();
let highlightedCods = [];
let popupActivo = null;
let connectionLineLayer = null;
let moveListener = null;

const map = new ol.Map({
  target: 'map',
  layers: [],
  view: new ol.View({ center: ol.proj.fromLonLat([-74.1, 4.6]), zoom: 6 })
});

// Capas base
const osmLayer = new ol.layer.Tile({ source: new ol.source.OSM(), visible: true });
const satelliteLayer = new ol.layer.Tile({
  source: new ol.source.XYZ({
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    attributions: 'Tiles © Esri'
  }),
  visible: false
});
map.addLayer(osmLayer);
map.addLayer(satelliteLayer);

// Capa para la línea
connectionLineLayer = new ol.layer.Vector({
  source: new ol.source.Vector(),
  style: new ol.style.Style({
    stroke: new ol.style.Stroke({ color: '#F0AF0A', width: 4, opacity: 0.85 })
  })
});
map.addLayer(connectionLineLayer);

// Selector de basemap
document.getElementById('basemapType').addEventListener('change', function() {
  osmLayer.setVisible(this.value === 'osm');
  satelliteLayer.setVisible(this.value === 'satellite');
});

// Funciones auxiliares
function getCodigoMunicipio(feature) {
  const cod = feature.get('MPIO_CCNCT');
  return cod ? cod.toString().padStart(5, "0") : null;
}

function buscarEntidad(cod) {
  return entidades.find(e => e.cod_municipio === cod);
}

function unique(arr) { return [...new Set(arr)].sort(); }

function cerrarPopupActivo() {
  if (popupActivo) {
    document.body.removeChild(popupActivo);
    if (moveListener) map.un('moveend', moveListener);
    connectionLineLayer.getSource().clear();
    popupActivo = null;
  }
}

function crearPopup(entidad, centerLonLat) {
  cerrarPopupActivo();

  const div = document.createElement("div");
  div.className = "popup-flotante";
  div.innerHTML = `
    <div class="btn-cerrar">✕</div>
    <div class="popup-header">
      <img src="https://www.defensoria.gov.co/o/defensoria-del-pueblo-theme/html/assets/img/home/2022_06-16_logo_DPC_home-desktop.svg">
      <div class="popup-title">Defensoría Delegada para los Asuntos Agrarios</div>
    </div>
    <div class="popup-line"></div>
    <b>Departamento:</b> ${entidad.departamento}<br>
    <b>Municipio:</b> ${entidad.municipio}<br>
    <table class="popup-table">
      <thead><tr><th>Predio</th><th>FMI</th><th>Organización</th></tr></thead>
      <tbody>${entidad.prediosInfo.map(p => 
        `<tr><td>${p.predio || '-'}</td><td>${p.FMI || '-'}</td><td>${p.organizacion || '-'}</td></tr>`
      ).join('')}</tbody>
    </table>`;

  document.body.appendChild(div);

  const centerCoord = ol.proj.fromLonLat(centerLonLat);

  const updateLine = () => {
    if (!div.isConnected) return;

    const rect = div.getBoundingClientRect();
    const popupCenterPixel = [
      rect.left + rect.width / 2,
      rect.top + rect.height / 2
    ];

    const lineFeature = new ol.Feature({
      geometry: new ol.geom.LineString([
        centerCoord,
        map.getCoordinateFromPixel(popupCenterPixel)
      ])
    });

    connectionLineLayer.getSource().clear();
    connectionLineLayer.getSource().addFeature(lineFeature);
  };

  // Posición inicial
  const initialPixel = map.getPixelFromCoordinate(centerCoord);
  if (initialPixel) {
    div.style.left = (initialPixel[0] + 40) + "px";
    div.style.top  = (initialPixel[1] - 120) + "px";
  }
  updateLine();

  // Actualizar al mover/zoom mapa
  moveListener = updateLine;
  map.on('moveend', updateLine);

  // DRAG
  let dragging = false;
  let startX, startY, initialLeft, initialTop;

  const startDrag = (e) => {
    if (e.target.closest('.btn-cerrar')) return;
    e.preventDefault();
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    initialLeft = div.offsetLeft;
    initialTop  = div.offsetTop;
    div.style.cursor = 'grabbing';
  };

  const doDrag = (e) => {
    if (!dragging) return;
    e.preventDefault();
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    div.style.left = (initialLeft + dx) + 'px';
    div.style.top  = (initialTop + dy) + 'px';
    updateLine();
  };

  const stopDrag = () => {
    dragging = false;
    div.style.cursor = 'move';
  };

  div.addEventListener('mousedown', startDrag);
  document.addEventListener('mousemove', doDrag);
  document.addEventListener('mouseup', stopDrag);

  div.querySelector('.btn-cerrar').onclick = () => {
    document.removeEventListener('mousemove', doDrag);
    document.removeEventListener('mouseup', stopDrag);
    cerrarPopupActivo();
  };

  popupActivo = div;
}

function styleMunicipio(feature) {
  const cod = getCodigoMunicipio(feature);
  const color = coloresMunicipios[cod];
  if (highlightedCods.includes(cod) && color) {
    return new ol.style.Style({
      stroke: new ol.style.Stroke({ color: '#000000', width: 1 }),
      fill: new ol.style.Fill({ color: color + 'CC' })
    });
  }
  return new ol.style.Style({ stroke: new ol.style.Stroke({color:'transparent'}), fill: new ol.style.Fill({color:'transparent'}) });
}

function reStyleMapa() { if (municipiosLayer) municipiosLayer.changed(); }

function renderTable(filtered) {
  const tbody = document.querySelector("#dataTable tbody");
  tbody.innerHTML = "";
  filtered.forEach(row => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${row.Cod_Municipio}</td><td>${row.MUNICIPIO}</td><td>${row.DEPARTAMENTO}</td><td>${row.HECHO_VICTIMIZANTE}</td><td>${row.NOMBRE_DEL_PREDIO}</td><td>${row.Hectareas}</td><td>${row.FOLIO_DE_MATRICULA}</td><td>${row.ORGANIZACIÓN_BENEFICIARIA}</td>`;
    tr.onclick = () => {
      highlightedCods = [row.Cod_Municipio];
      reStyleMapa();
      const feature = municipioLayers.get(row.Cod_Municipio);
      if (feature) {
        const center3857 = feature.getGeometry().getInteriorPoint().getCoordinates();
        const centerLonLat = ol.proj.toLonLat(center3857);
        crearPopup(buscarEntidad(row.Cod_Municipio), centerLonLat);
      }
    };
    tbody.appendChild(tr);
  });
}

const sD = document.getElementById("filterDepartamento");
const sM = document.getElementById("filterMunicipio");

function aplicarFiltros() {
  let f = datosTabla;
  if (sD.value) f = f.filter(r => r.DEPARTAMENTO === sD.value);
  if (sM.value) f = f.filter(r => r.MUNICIPIO === sM.value);
  renderTable(f);
  highlightedCods = f.map(r => r.Cod_Municipio);
  reStyleMapa();
}

sD.onchange = () => {
  sM.innerHTML = '<option value="">Todos los municipios</option>';
  unique(datosTabla.filter(e => e.DEPARTAMENTO === sD.value).map(e => e.MUNICIPIO)).forEach(m => sM.add(new Option(m, m)));
  aplicarFiltros();
};

sM.onchange = aplicarFiltros;

document.getElementById("btnLimpiarFiltros").onclick = () => {
  sD.value = ""; sM.value = ""; cerrarPopupActivo(); aplicarFiltros();
};

// Carga de GeoJSON
fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson")
.then(r => r.json()).then(worldData => {
  const format = new ol.format.GeoJSON();
  const nonCol = worldData.features
    .filter(f => f.properties.ADMIN !== "Colombia")
    .map(f => format.readFeature(f, {dataProjection:'EPSG:4326', featureProjection:'EPSG:3857'}));

  map.addLayer(new ol.layer.Vector({
    source: new ol.source.Vector({features: nonCol}),
    style: new ol.style.Style({
      stroke: new ol.style.Stroke({color:'#0a0a0a', width:1}),
      fill: new ol.style.Fill({color:'rgba(204,204,204,0.4)'})
    })
  }));

  return fetch("https://raw.githubusercontent.com/caticoa3/colombia_mapa/master/co_2018_MGN_MPIO_POLITICO.geojson");
})
.then(r => r.json()).then(data => {
  const format = new ol.format.GeoJSON();
  const features = format.readFeatures(data, {dataProjection:'EPSG:4326', featureProjection:'EPSG:3857'});

  municipioLayers = new Map();
  features.forEach(f => {
    const cod = getCodigoMunicipio(f);
    if (cod) municipioLayers.set(cod, f);
  });

  municipiosLayer = new ol.layer.Vector({
    source: new ol.source.Vector({features}),
    style: styleMunicipio
  });
  map.addLayer(municipiosLayer);

  // Tooltip
  const tooltip = document.getElementById("tooltip");
  let currentFeat = null;
  map.on('pointermove', evt => {
    const feat = map.forEachFeatureAtPixel(evt.pixel, f => f, {layerFilter: l => l === municipiosLayer});
    if (feat) {
      map.getTargetElement().style.cursor = 'pointer';
      const name = feat.get('MPIO_CNMBR') || '';
      if (feat !== currentFeat) {
        tooltip.textContent = name;
        tooltip.style.display = 'block';
        tooltip.style.left = (evt.pixel[0]+15)+'px';
        tooltip.style.top = (evt.pixel[1]+10)+'px';
        currentFeat = feat;
      }
    } else {
      map.getTargetElement().style.cursor = '';
      tooltip.style.display = 'none';
      currentFeat = null;
    }
  });

  // Click
  map.on('click', evt => {
    const feat = map.forEachFeatureAtPixel(evt.pixel, f => f, {layerFilter: l => l === municipiosLayer});
    if (feat) {
      const cod = getCodigoMunicipio(feat);
      const ent = buscarEntidad(cod);
      if (ent) {
        highlightedCods = [cod];
        reStyleMapa();
        const center3857 = feat.getGeometry().getInteriorPoint().getCoordinates();
        const centerLonLat = ol.proj.toLonLat(center3857);
        crearPopup(ent, centerLonLat);
      }
    }
  });

  unique(datosTabla.map(e => e.DEPARTAMENTO)).forEach(d => sD.add(new Option(d, d)));
  aplicarFiltros();
})
.catch(err => console.error("Error cargando GeoJSON:", err));
</script>
